    <!-- Custom Styles -->
    <style>
      body {
        font-family: 'Inter', sans-serif;
        --bg-color: #f1f5f9;
        --text-color: #1e293b;
        --text-muted-color: #64748b;
        --card-bg-color: white;
        --footer-bg-color: #e2e8f0;
        --footer-text-color: #475569;
        --link-hover-color: #1d4ed8;
        --border-color: #cbd5e1;
        background-color: var(--bg-color);
        color: var(--text-color);
        transition: background-color 0.3s, color 0.3s;
      }
      .font-digital {
        font-family: 'Roboto Mono', monospace;
      }
      .dark {
        --bg-color: #1e293b;
        --text-color: #f1f5f9;
        --text-muted-color: #94a3b8;
        --card-bg-color: #334155;
        --footer-bg-color: #334155;
        --footer-text-color: #94a3b8;
        --link-hover-color: #60a5fa;
        --border-color: #475569;
      }
      .theme-blue {
        --bg-color: #EBF4FF;
        --text-color: #2C5282;
        --text-muted-color: #6A85A3;
        --card-bg-color: white;
        --footer-bg-color: #BFDBFE;
        --footer-text-color: #1E40AF;
        --link-hover-color: #1D4ED8;
        --border-color: #93C5FD;
      }
    </style>
